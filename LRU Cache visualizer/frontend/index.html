<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRU Cache Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>LRU Cache Visualizer</h1>
            <p class="subtitle">See how Least Recently Used works in real-time.</p>
        </header>

        <section class="controls-card">
            <div class="capacity-section">
                <label for="capacity-input">Capacity:</label>
                <input type="number" id="capacity-input" placeholder="e.g., 3" min="1" value="3">
                <button id="set-capacity-btn" class="btn-secondary">Set</button>
            </div>
            
            <div class="inputs-section">
                <div class="input-group">
                    <input type="text" id="key-input" placeholder="Key">
                    <input type="text" id="value-input" placeholder="Value (optional for GET)">
                </div>
                <div class="actions">
                    <button id="get-btn" class="btn-primary">GET</button>
                    <button id="put-btn" class="btn-primary">PUT</button>
                </div>
            </div>
            <div id="status-message" class="status">Welcome! Set a capacity or start typing.</div>
        </section>

        <section class="cache-section">
            <div class="cache-labels">
                <span class="label-mru">MRU (Most Recently Used)</span>
                <span class="label-lru">LRU (Least Recently Used)</span>
            </div>
            
            <div id="cache-display" class="cache-container">
                <!-- Cache cards will be dynamically inserted here -->
                <div class="empty-state">Cache is empty</div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
